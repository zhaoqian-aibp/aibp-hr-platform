<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AIBP</title>
  <script>
    // SPA fallback: redirect 404 to root with the path preserved as hash
    sessionStorage.redirect = location.pathname;
    location.replace('/aibp-hr-platform/' + (sessionStorage.redirect ? '?redirect=' + encodeURIComponent(sessionStorage.redirect.replace('/aibp-hr-platform', '')) : ''));
  </script>
</head>
<body></body>
</html>
